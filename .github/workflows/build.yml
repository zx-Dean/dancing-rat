name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .exe
        run: pyinstaller --noconfirm dancing_rat.spec
      - uses: actions/upload-artifact@v4
        with:
          name: dancing_rat-windows
          path: dist/dancing_rat.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .app
        run: pyinstaller --noconfirm dancing_rat.spec
      - name: Package .dmg
        run: |
          mkdir -p dist/dmg
          cp -R "dist/dancing_rat.app" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create \
            -volname "Dancing Rat" \
            -srcfolder dist/dmg \
            -ov \
            -format UDZO \
            dist/dancing_rat.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: dancing_rat-macos
          path: dist/dancing_rat.dmg

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dancing_rat-windows/dancing_rat.exe
            artifacts/dancing_rat-macos/dancing_rat.dmg
