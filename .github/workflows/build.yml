name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .exe
        run: pyinstaller --noconfirm dancing_rat.spec
      - uses: actions/upload-artifact@v4
        with:
          name: dancing_rat-windows
          path: dist/dancing_rat.exe

  build-macos:
    runs-on: macos-14
    env:
      PY_VERSION: 3.12.7
    steps:
      - uses: actions/checkout@v4
      - name: Install universal2 Python from python.org
        run: |
          curl -L "https://www.python.org/ftp/python/${PY_VERSION}/python-${PY_VERSION}-macos11.pkg" -o python.pkg
          sudo installer -pkg python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> "$GITHUB_PATH"
      - name: Verify Python is universal2
        run: |
          file "$(which python3.12)"
          file "$(which python3.12)" | grep -q "2 architectures" || { echo "Python is not universal2!"; exit 1; }
      - name: Install pynput + pyinstaller (already universal2 / pure-python)
        run: |
          python3.12 -m pip install --upgrade pip 'delocate>=0.11'
          # pynput: pure-python; its mac deps (pyobjc-*) ship universal2 wheels
          # pyinstaller: ships universal2 wheel directly
          python3.12 -m pip install --target ./build_libs pynput pyinstaller
      - name: Fuse arm64 + x86_64 Pillow wheels into universal2
        run: |
          mkdir -p pillow_wheels
          python3.12 -m pip download \
            --platform macosx_11_0_arm64 --python-version 3.12 \
            --only-binary=:all: --no-deps -d pillow_wheels "Pillow>=11.0.0"
          python3.12 -m pip download \
            --platform macosx_10_13_x86_64 --python-version 3.12 \
            --only-binary=:all: --no-deps -d pillow_wheels "Pillow>=11.0.0"
          arm_wheel=$(ls pillow_wheels/*arm64*.whl)
          x86_wheel=$(ls pillow_wheels/*x86_64*.whl)
          delocate-merge "$arm_wheel" "$x86_wheel" -w pillow_wheels
          universal_wheel=$(ls pillow_wheels/*universal2*.whl | head -1)
          echo "Fused: $universal_wheel"
          python3.12 -m pip install --target ./build_libs --no-deps --upgrade "$universal_wheel"
      - name: Build .app
        env:
          PYTHONPATH: ./build_libs
        run: python3.12 -m PyInstaller --noconfirm dancing_rat.spec
      - name: Verify .app is universal2
        run: |
          lipo -archs "dist/dancing_rat.app/Contents/MacOS/dancing_rat"
          lipo -archs "dist/dancing_rat.app/Contents/MacOS/dancing_rat" | grep -q "x86_64" \
            && lipo -archs "dist/dancing_rat.app/Contents/MacOS/dancing_rat" | grep -q "arm64" \
            || { echo "App binary is not universal2!"; exit 1; }
      - name: Package .dmg
        run: |
          mkdir -p dist/dmg
          cp -R "dist/dancing_rat.app" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create \
            -volname "Dancing Rat" \
            -srcfolder dist/dmg \
            -ov \
            -format UDZO \
            dist/dancing_rat.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: dancing_rat-macos
          path: dist/dancing_rat.dmg

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dancing_rat-windows/dancing_rat.exe
            artifacts/dancing_rat-macos/dancing_rat.dmg
